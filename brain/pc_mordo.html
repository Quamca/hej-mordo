<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mordo</title>
<style>
  body { background:#1a1a1a; color:#ccc; font-family: sans-serif; display:flex; flex-direction:column; align-items:center; padding-top:40px; }
  #startBtn { padding: 12px 24px; font-size:16px; cursor:pointer; }
  .row { display:flex; align-items:center; gap:10px; margin:8px 0; width:260px; }
  .label { width:50px; color:#888; }
  #micBarWrap { flex:1; height:16px; background:#333; }
  #micBar { height:16px; width:0; background:#0a4; }
  #spkDot { width:14px; height:14px; border-radius:50%; background:#444; }
  #taskPanel { width:300px; margin-top:16px; }
  #taskAddRow { display:flex; gap:6px; }
  #taskInput { flex:1; background:#222; border:1px solid #444; color:#ccc; padding:4px; }
  .task-row { display:flex; align-items:center; gap:6px; padding:4px 0; border-bottom:1px solid #333; }
  .task-row span { flex:1; cursor:pointer; }
  .task-row button { background:none; border:none; color:#c66; cursor:pointer; font-size:16px; }
</style>
</head>
<body>
<button id="startBtn">Połącz z Mordo</button>
<div class="row" id="statusRow1" style="display:none">
  <div class="label">MIC</div>
  <div id="micBarWrap"><div id="micBar"></div></div>
</div>
<div class="row" id="statusRow2" style="display:none">
  <div class="label">SPEAK</div>
  <div id="spkDot"></div>
</div>
<div id="camWrap" style="position:relative; display:none; margin-top:10px;">
  <video id="camPreview" width="320" height="240" autoplay muted playsinline></video>
  <canvas id="faceOverlay" width="320" height="240" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
</div>
<button id="photoBtn" style="display:none; margin-top:8px;">Zrób zdjęcie referencyjne</button>
<canvas id="camCanvas" width="320" height="240" style="display:none;"></canvas>
<div id="taskPanel" style="display:none">
  <div id="taskAddRow">
    <input id="taskInput" type="text" placeholder="Nowe zadanie...">
    <button id="taskAddBtn">+</button>
  </div>
  <div id="taskList"></div>
</div>
<script src="pc_mordo.js"></script>
</body>
</html>
